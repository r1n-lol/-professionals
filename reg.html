<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reg_auth.css">
    <title>Регистрация</title>
</head>

<body>
    <div class="main_container">


        <div class="form_content">
            <form action="">
                <h2>Регистрация</h2>

                <input class="reg-input" type="email" placeholder="Email" required>
                <input class="reg-input" type="text" name="name" placeholder="Имя" required>
                <input class="reg-input" type="text" name="surname" placeholder="Фамилия">
                <input class="reg-input" type="text" name="phone" placeholder="Телефон" required>
                <input class="reg-input" type="password" name="password" placeholder="Пароль" required>
                <input class="reg-input" type="password" name="repet_password" placeholder="Повторите пароль" required>
                <div class="checkbox">
                    <input class="input-checkbox" type="checkbox">
                    <p class="checkbox-text">Согласие на обработку персональных данных</p>
                </div>


                <button type="submit">Регистрация</button>
                <div class="links-reg">
                    <a href="auth.html">Есть аккаунт?</a>
                    <a href="auth.html" class="reg-link">Войти</a>
                </div>
            </form>
        </div>

    </div>
</body>

</html>
